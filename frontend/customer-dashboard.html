<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - LogiTrack</title>
    <link href="vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="customer-dashboard.html">🚚 LogiTrack</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="customer-dashboard.html">Customer Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-danger" href="#" id="logoutBtn">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container page-shell">
        <div class="mb-4">
            <h1 class="page-title mb-1">Customer Dashboard</h1>
            <div class="text-muted">Book new shipments and track deliveries in real time.</div>
        </div>

        <div id="message" class="alert d-none" role="alert"></div>

        <ul class="nav nav-pills mb-4" id="dashboardTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="track-tab" data-bs-toggle="pill" data-bs-target="#trackSection" type="button" role="tab" aria-controls="trackSection" aria-selected="true">📍 Track Shipment</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="book-tab" data-bs-toggle="pill" data-bs-target="#bookSection" type="button" role="tab" aria-controls="bookSection" aria-selected="false">📦 Book a Shipment</button>
            </li>
        </ul>

        <div class="tab-content" id="dashboardTabContent">
            <!-- Tracking Section -->
            <div class="tab-pane fade show active" id="trackSection" role="tabpanel" aria-labelledby="track-tab">
                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Track Parcel</h5>
                                <form id="trackingForm">
                                    <div class="mb-3">
                                        <label for="parcelIdInput" class="form-label">Enter Parcel ID</label>
                                        <input type="text" class="form-control" id="parcelIdInput" placeholder="e.g., LP-123456" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Track Parcel</button>
                                </form>
                            </div>
                        </div>

                        <div class="card mt-3" id="parcelInfo" style="display: none;">
                            <div class="card-body">
                                <h5 class="card-title">Parcel Information</h5>
                                <p><strong>ID:</strong> <span id="infoParcelId"></span></p>
                                <p><strong>Status:</strong> <span id="infoStatus" class="badge bg-secondary"></span></p>
                                <p><strong>Sender:</strong> <span id="infoSender"></span></p>
                                <p><strong>Receiver:</strong> <span id="infoReceiver"></span></p>
                                <p><strong>Driver:</strong> <span id="infoDriver"></span></p>
                                <p><strong>Destination:</strong> <span id="infoDestination"></span></p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Live Map</h5>
                                <div class="map-shell">
                                    <div id="map"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Booking Section -->
            <div class="tab-pane fade" id="bookSection" role="tabpanel" aria-labelledby="book-tab">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-dark text-white p-3">
                                <h5 class="card-title mb-0 d-flex align-items-center gap-2">📦 Request a Shipment / Pickup</h5>
                            </div>
                            <div class="card-body p-4">
                                <form id="bookingForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="bookReceiverName" class="form-label">Receiver Name *</label>
                                            <input type="text" class="form-control animate-focus" id="bookReceiverName" placeholder="Recipient full name" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="bookWeight" class="form-label">Weight (kg) *</label>
                                            <input type="number" step="0.1" class="form-control animate-focus" id="bookWeight" placeholder="Package weight in kg" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="bookPickupAddress" class="form-label">Pickup Address *</label>
                                        <textarea class="form-control animate-focus" id="bookPickupAddress" rows="2" placeholder="Where the driver should pick up the package" required></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label for="bookDeliveryAddress" class="form-label">Delivery Address *</label>
                                        <textarea class="form-control animate-focus" id="bookDeliveryAddress" rows="2" placeholder="Where the driver should deliver the package" required></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100 shadow-sm font-weight-bold" style="background-color: #10B981; border-color: #10B981;">Submit Booking Request</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="vendor/socket.io/socket.io.min.js"></script>
    <script src="js/map.js?v=6"></script>
    <script src="js/app.js?v=6"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initMap();
            initSocket();
            
            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                sessionStorage.removeItem('token');
                sessionStorage.removeItem('userRole');
                window.location.href = 'index.html';
            });

            document.getElementById('trackingForm').addEventListener('submit', function(e) {
                e.preventDefault();
                trackParcel();
            });

            // Handle online booking form submission
            const bookingForm = document.getElementById('bookingForm');
            if (bookingForm) {
                bookingForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const receiverName = document.getElementById('bookReceiverName').value;
                    const weight = parseFloat(document.getElementById('bookWeight').value);
                    const pickupAddress = document.getElementById('bookPickupAddress').value;
                    const deliveryAddress = document.getElementById('bookDeliveryAddress').value;

                    try {
                        const response = await fetch(`${API_BASE_URL}/parcels/book`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ receiverName, weight, pickupAddress, deliveryAddress })
                        });

                        const result = await response.json();

                        if (response.ok) {
                            showMessage(`Booking request submitted! Tracking ID: ${result.parcel.parcelId}`, 'success');
                            bookingForm.reset();
                            
                            // Switch tab back to tracking and autofill the ID
                            document.getElementById('parcelIdInput').value = result.parcel.parcelId;
                            const trackTab = new bootstrap.Tab(document.getElementById('track-tab'));
                            trackTab.show();
                            
                            // Invalidate map size so Leaflet updates layout correctly after visibility toggle
                            setTimeout(() => {
                                if (map) map.invalidateSize();
                                trackParcel();
                            }, 150);
                        } else {
                            showMessage(result.message || 'Error creating booking request', 'danger');
                        }
                    } catch (error) {
                        console.error('Error submitting booking:', error);
                        showMessage('Server error. Please try again.', 'danger');
                    }
                });
            }
        });
    </script>
</body>
</html>
